site_name: 夏天的个人网站
site_url: https://suyunax.com
site_description: 数学学习、编程实践、旅行足迹和生活随笔
site_author: 夏天
repo_url: https://github.com/suyun-xiatian/my-site
repo_name: suyun-xiatian/my-site
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 夏天

theme:
  name: material
  variant: modern
  language: zh
  font: false
  logo: assets/images/branding/brand-mark.webp
  favicon: assets/images/branding/favicon-192.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    tag:
      default: lucide/hash
      learning: material/book-open-page-variant
      code: fontawesome/solid/code
      life: material/coffee-outline
      travel: material/map-marker-path
      essay: material/feather
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.path
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js

nav:
  - 首页: index.md
  - 关于: about.md
  - 文章索引: archive.md
  - 学习笔记:
      - learning/index.md
      - 重修微积分:
          - learning/calculus/index.md
          - 第一章 极限与连续:
              - learning/calculus/chapter-01/index.md
  - 编程:
      - coding/index.md
      - Python 与数据分析: coding/python.md
      - 项目与实践: coding/projects.md
      - 建站记录: coding/site.md
  - 足迹: footprints/index.md
  - 随笔: essays/index.md
  - 更新日志: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - zensical.extensions.glightbox:
      auto_caption: true
      skip_classes:
        - off-glb

extra:
  tags:
    数学: learning
    Python: code
    数据分析: code
    建站: code
    项目: code
    足迹: travel
    旅行: travel
    随笔: essay
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/suyun-xiatian
      name: GitHub
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/550495241
      name: 哔哩哔哩
    - icon: fontawesome/brands/zhihu
      link: https://www.zhihu.com/people/shan-si-tao-hua-shi-sheng-kai-56
      name: 知乎
    - icon: fontawesome/brands/weixin
      link: /contact/
      name: 微信
    - icon: material/email
      link: mailto:suyunax@gmail.com
      name: 邮箱
