site_name: 夏天的个人网站
site_url: https://suyunax.com
site_description: 统计学习、编程实践、旅行足迹和生活随笔
site_author: 夏天
repo_url: https://github.com/suyun-xiatian/my-site
repo_name: suyun-xiatian/my-site
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 夏天 · 内容持续更新中

theme:
  name: material
  variant: modern
  language: zh
  logo: assets/images/logo_complex.png
  favicon: assets/images/logo_round_background.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    tag:
      default: lucide/hash
      learning: material/book-open-page-variant
      code: fontawesome/solid/code
      life: material/coffee-outline
      travel: material/map-marker-path
      essay: material/feather
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.path
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - navigation.instant.progress
    - navigation.instant.prefetch
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 关于: about.md
  - 文章索引: archive.md
  - 学习笔记:
      - learning/index.md
      - 统计学习: learning/statistics.md
      - 数学工具箱: learning/math.md
  - 编程:
      - coding/index.md
      - Python 与数据分析: coding/python.md
      - 项目与实践: coding/projects.md
      - 建站记录: coding/site.md
  - 生活:
      - life/index.md
      - 足球: life/football.md
      - 足迹: life/footprints.md
      - 随笔: life/essays.md
      - 书影音: life/media.md
  - 更新日志: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - zensical.extensions.glightbox:
      auto_caption: true
      skip_classes:
        - off-glb

extra:
  tags:
    统计: learning
    数学: learning
    Python: code
    数据分析: code
    建站: code
    项目: code
    足球: life
    书影音: life
    足迹: travel
    旅行: travel
    随笔: essay
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/suyun-xiatian
      name: GitHub
